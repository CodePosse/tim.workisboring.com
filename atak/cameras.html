<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>SoCal TAK Cameras | Public Camera Map for ATAK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description"
    content="A public Southern California camera dashboard for ATAK training, featuring ALERTCalifornia, AlertWest, and Cal OES webcam layers.">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">


  <link rel="canonical" href="https://tim.workisboring.com/atak/cameras.html">

  <meta property="og:type" content="website">
  <meta property="og:title" content="SoCal TAK Cameras">
  <meta property="og:description"
    content="Public camera layers for ATAK training and Southern California situational awareness.">
  <meta property="og:url" content="https://tim.workisboring.com/atak/cameras.html">
  <meta property="og:site_name" content="tim.workisboring.com">
  <meta property="og:image" content="https://tim.workisboring.com/atak/social-card.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="SoCal TAK Cameras">
  <meta name="twitter:description"
    content="Public camera layers for ATAK training and Southern California situational awareness.">
  <meta name="twitter:image" content="https://tim.workisboring.com/atak/social-card.png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --border: #334155;
      --link: #7dd3fc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #app {
      display: grid;
      grid-template-columns: 360px 1fr;
      height: 100%;
    }

    aside {
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1rem;
    }

    #map {
      height: 100%;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.25rem;
      margin: 0 0 .25rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 1rem;
    }

    .status {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: .75rem;
      margin-bottom: 1rem;
      font-size: .9rem;
    }

    input[type="search"] {
      width: 100%;
      padding: .7rem .8rem;
      border-radius: .65rem;
      border: 1px solid var(--border);
      background: #020617;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .filters {
      display: grid;
      gap: .5rem;
      margin-bottom: 1rem;
    }

    label {
      display: flex;
      align-items: center;
      gap: .5rem;
      color: var(--muted);
      font-size: .95rem;
    }

    .links {
      display: grid;
      gap: .35rem;
      margin-bottom: 1rem;
    }

    .links a {
      color: var(--link);
      text-decoration: none;
      font-size: .9rem;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .camera-list {
      display: grid;
      gap: .65rem;
    }

    .card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: .75rem;
      cursor: pointer;
    }

    .card:hover {
      border-color: var(--accent);
    }

    .card strong {
      display: block;
      margin-bottom: .2rem;
    }

    .meta {
      color: var(--muted);
      font-size: .85rem;
    }

    .badge {
      display: inline-block;
      padding: .15rem .45rem;
      border-radius: 999px;
      background: #0f766e;
      color: white;
      font-size: .72rem;
      margin-bottom: .4rem;
    }

    .popup {
      max-width: 340px;
    }

    .popup img {
      width: 100%;
      max-width: 320px;
      border-radius: 8px;
      display: block;
      margin-top: .5rem;
    }

    .popup a {
      color: #0369a1;
      display: inline-block;
      margin-top: .35rem;
    }

    @media (max-width: 900px) {
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      aside {
        max-height: 42vh;
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }

      #map {
        min-height: 58vh;
      }
    }
  </style>
</head>

<body>
<div id="app">
  <aside>
    <h1>SoCal TAK Cameras</h1>
    <div class="subtitle">Public camera layers for ATAK training and situational awareness.</div>

    <div class="status" id="status">Loading camera feed…</div>

    <input id="search" type="search" placeholder="Search name, source, county, route…">

    <div class="filters" id="filters">
      <label><input type="checkbox" value="ALERTCalifornia / AlertWest" checked> ALERTCalifornia / AlertWest</label>
      <label><input type="checkbox" value="Cal OES" checked> Cal OES</label>
      <label><input type="checkbox" value="Caltrans CCTV" checked> Caltrans CCTV</label>
    </div>

    <div class="links">
      <a href="/atak/all-cameras-network.kml">ATAK: All Cameras Network KML</a>
      <a href="/atak/data/cameras.json">Raw JSON Feed</a>
      <a href="/atak/all-cameras.kml">Generated KML</a>
    </div>

    <div class="camera-list" id="cameraList"></div>
  </aside>

  <main id="map"></main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const DATA_URL = "/atak/data/cameras.json";

const map = L.map("map").setView([34.35, -117.8], 7);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 18,
  attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

let allCameras = [];
let markers = [];

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function popupHtml(cam) {
  return `
    <div class="popup">
      <span class="badge">${escapeHtml(cam.category || cam.source)}</span><br>
      <strong>${escapeHtml(cam.name)}</strong><br>
      Source: ${escapeHtml(cam.source || "")}<br>
      ${cam.county ? `County: ${escapeHtml(cam.county)}<br>` : ""}
      ${cam.route ? `Route: ${escapeHtml(cam.route)}<br>` : ""}
      ${cam.district ? `District: ${escapeHtml(cam.district)}<br>` : ""}
      ${cam.heading ? `View: ${escapeHtml(cam.heading)}°<br>` : ""}
      ${cam.url ? `<a href="${escapeHtml(cam.url)}" target="_blank" rel="noopener">Open camera</a><br>` : ""}
      ${cam.thumbnail ? `<a href="${escapeHtml(cam.thumbnail)}" target="_blank" rel="noopener">Open latest image</a><img src="${escapeHtml(cam.thumbnail)}" alt="${escapeHtml(cam.name)}">` : ""}
    </div>
  `;
}

function clearMarkers() {
  markers.forEach(marker => map.removeLayer(marker));
  markers = [];
}

function activeSources() {
  return new Set(
    [...document.querySelectorAll("#filters input:checked")].map(input => input.value)
  );
}

function filteredCameras() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const active = activeSources();

  return allCameras.filter(cam => {
    if (!active.has(cam.source)) return false;
    if (!q) return true;

    return [
      cam.name,
      cam.source,
      cam.category,
      cam.county,
      cam.route,
      cam.district
    ].join(" ").toLowerCase().includes(q);
  });
}

function render() {
  clearMarkers();

  const cams = filteredCameras();
  const list = document.getElementById("cameraList");
  list.innerHTML = "";

  cams.forEach(cam => {
    const marker = L.marker([cam.lat, cam.lon]).bindPopup(popupHtml(cam));
    marker.addTo(map);
    markers.push(marker);
    cam.marker = marker;
  });

  cams.slice(0, 120).forEach(cam => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <span class="badge">${escapeHtml(cam.category || cam.source)}</span>
      <strong>${escapeHtml(cam.name)}</strong>
      <div class="meta">
        ${escapeHtml(cam.source || "")}
        ${cam.county ? " · " + escapeHtml(cam.county) : ""}
        ${cam.route ? " · Route " + escapeHtml(cam.route) : ""}
      </div>
    `;
    card.addEventListener("click", () => {
      map.setView([cam.lat, cam.lon], 12);
      cam.marker.openPopup();
    });
    list.appendChild(card);
  });

  document.getElementById("status").textContent =
    `${cams.length} visible / ${allCameras.length} total cameras loaded`;
}

async function init() {
  const response = await fetch(DATA_URL);
  const payload = await response.json();

  allCameras = payload.cameras || [];

  document.getElementById("status").textContent =
    `${allCameras.length} cameras loaded`;

  render();
}

document.getElementById("search").addEventListener("input", render);
document.querySelectorAll("#filters input").forEach(input => {
  input.addEventListener("change", render);
});

init().catch(err => {
  console.error(err);
  document.getElementById("status").textContent = "Failed to load camera data.";
});
</script>
</body>
</html>
